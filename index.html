<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Embedder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
    }
    input {
      width: 80%;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 12px;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
    }
    iframe {
      margin-top: 20px;
      width: 100%;
      height: 315px;
      border: none;
    }
  </style>
</head>
<body>
  <h1>YouTube Video Embedder</h1>
  <p>Enter a YouTube link or video ID below:</p>

  <form id="videoForm">
    <input type="text" id="videoUrl" placeholder="e.g. https://www.youtube.com/watch?v=dQw4w9WgXcQ" required>
    <button type="submit">Embed Video</button>
  </form>

  <div id="videoContainer"></div>

  <script>
    document.getElementById("videoForm").addEventListener("submit", function(event) {
      event.preventDefault();
      let input = document.getElementById("videoUrl").value.trim();
      let videoId = "";

      if (/^[a-zA-Z0-9_-]{11}$/.test(input)) {
        videoId = input;
      } else {
        const ytMatch = input.match(
          /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/
        );
        if (ytMatch && ytMatch[1]) {
          videoId = ytMatch[1];
        }
      }

      if (videoId) {
        const embedUrl = `https://www.youtube.com/embed/${videoId}`;
        document.getElementById("videoContainer").innerHTML =
          `<iframe src="${embedUrl}" allowfullscreen></iframe>`;
      } else {
        alert("Please enter a valid YouTube link or video ID.");
      }
    });
  </script>
</body>
</html>
